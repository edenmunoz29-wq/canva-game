<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>4 Pics 1 Word — Canva Icons</title>
  <!-- ✅ Load Tabler Icons CSS -->
  <link rel="stylesheet" href="https://unpkg.com/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    * { box-sizing: border-box; }
    .game { padding: 1rem 0; font-family: var(--font-sans, Arial, sans-serif); }
    .top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; }
    .round-info, .score { font-size: 13px; color: #666; }
    .score span { font-weight: 500; color: #000; }
    .pics { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.25rem; }
    .pic { background: #f9f9f9; border: 0.5px solid #ddd; border-radius: 8px; aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; padding: 6px; }
    .pic i { font-size: 46px; color: #555; }
    .pic span { font-size: 12px; color: #777; text-align: center; padding: 0 6px; }
    .hint-tag { text-align: center; font-size: 11px; color: #777; margin-bottom: 0.5rem; }
    .decoy-note { text-align: center; font-size: 11px; color: #b45309; background: #fef3c7; border-radius: 6px; padding: 4px 10px; margin-bottom: 0.75rem; }
    .answer-row { display: flex; gap: 8px; justify-content: center; margin-bottom: 1.25rem; flex-wrap: wrap; }
    .box { width: 44px; height: 48px; border-radius: 6px; border: 1.5px solid #ccc; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 500; cursor: pointer; background: #fff; color: #000; }
    .box.filled { border-color: #7F77DD; background: #EEEDFE; color: #3C3489; }
    .box.correct { border-color: #1D9E75; background: #E1F5EE; color: #0F6E56; }
    .box.wrong { border-color: #E24B4A; background: #FCEBEB; color: #A32D2D; }
    .tiles { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 1.25rem; }
    .tile { width: 44px; height: 48px; border-radius: 6px; border: 0.5px solid #ccc; background: #fff; display: flex; align-items: center; justify-content: center; font-size: 17px; font-weight: 500; color: #000; cursor: pointer; }
    .tile:hover { background: #eee; }
    .tile.used { opacity: 0.2; pointer-events: none; }
    .tile.decoy { color: #b45309; border-color: #fcd34d; background: #fffbeb; }
    .tile.decoy:hover { background: #fef3c7; }
    .btns { display: flex; gap: 8px; justify-content: center; margin-bottom: 0.75rem; }
    .msg { text-align: center; font-size: 14px; min-height: 20px; color: #666; }
    .msg.ok { color: #0F6E56; font-weight: 500; }
    .msg.no { color: #A32D2D; font-weight: 500; }
    .end { text-align: center; padding: 2.5rem 1rem; }
    .big { font-size: 52px; font-weight: 500; color: #000; }
    .sub { font-size: 14px; color: #666; margin-bottom: 1.5rem; }
  </style>
</head>

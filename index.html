
<style>
* { box-sizing: border-box; }
.game { padding: 1rem 0; font-family: var(--font-sans); }
.top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; }
.round-info { font-size: 13px; color: var(--color-text-secondary); }
.score { font-size: 13px; color: var(--color-text-secondary); }
.score span { font-weight: 500; color: var(--color-text-primary); }
.pics { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.25rem; }
.pic { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
.pic i { font-size: 46px; color: var(--color-text-secondary); }
.pic span { font-size: 12px; color: var(--color-text-tertiary); text-align: center; padding: 0 6px; }
.hint-tag { text-align: center; font-size: 11px; color: var(--color-text-tertiary); margin-bottom: 0.5rem; }
.decoy-note { text-align: center; font-size: 11px; color: #b45309; background: #fef3c7; border-radius: 6px; padding: 4px 10px; margin-bottom: 0.75rem; }
.answer-row { display: flex; gap: 8px; justify-content: center; margin-bottom: 1.25rem; flex-wrap: wrap; }
.box { width: 44px; height: 48px; border-radius: var(--border-radius-md); border: 1.5px solid var(--color-border-secondary); display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 500; cursor: pointer; background: var(--color-background-primary); color: var(--color-text-primary); }
.box.filled { border-color: #7F77DD; background: #EEEDFE; color: #3C3489; }
.box.correct { border-color: #1D9E75; background: #E1F5EE; color: #0F6E56; }
.box.wrong { border-color: #E24B4A; background: #FCEBEB; color: #A32D2D; }
.tiles { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 1.25rem; }
.tile { width: 44px; height: 48px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); display: flex; align-items: center; justify-content: center; font-size: 17px; font-weight: 500; color: var(--color-text-primary); cursor: pointer; }
.tile:hover { background: var(--color-background-secondary); }
.tile.used { opacity: 0.2; pointer-events: none; }
.tile.decoy { color: #b45309; border-color: #fcd34d; background: #fffbeb; }
.tile.decoy:hover { background: #fef3c7; }
.btns { display: flex; gap: 8px; justify-content: center; margin-bottom: 0.75rem; }
.msg { text-align: center; font-size: 14px; min-height: 20px; color: var(--color-text-secondary); }
.msg.ok { color: #0F6E56; font-weight: 500; }
.msg.no { color: #A32D2D; font-weight: 500; }
.end { text-align: center; padding: 2.5rem 1rem; }
.big { font-size: 52px; font-weight: 500; color: var(--color-text-primary); }
.sub { font-size: 14px; color: var(--color-text-secondary); margin-bottom: 1.5rem; }
</style>

<h2 class="sr-only">4 pics 1 word — Canva themed new word set with decoys</h2>
<div class="game" id="app"></div>

<script>
const ROUNDS = [
  {
    word: "TEXT",
    hint: "4 letters — add words to your design",
    decoys: ["Q","X","Z"],
    pics: [
      { icon: "ti-writing", label: "writing" },
      { icon: "ti-letter-case", label: "letters" },
      { icon: "ti-text-size", label: "words" },
      { icon: "ti-typography", label: "characters" }
    ]
  },
  {
    word: "IMAGE",
    hint: "5 letters — a photo or graphic in Canva",
    decoys: ["T","X","Z"],
    pics: [
      { icon: "ti-photo", label: "picture" },
      { icon: "ti-camera", label: "capture" },
      { icon: "ti-file-type-jpg", label: "photo file" },
      { icon: "ti-landscape", label: "scenery" }
    ]
  },
  {
    word: "CROP",
    hint: "4 letters — trim your image in Canva",
    decoys: ["X","Z","B"],
    pics: [
      { icon: "ti-crop", label: "trim edges" },
      { icon: "ti-scissors", label: "cut it" },
      { icon: "ti-aspect-ratio", label: "resize" },
      { icon: "ti-frame", label: "border" }
    ]
  },
  {
    word: "DESIGN",
    hint: "6 letters — what you create in Canva",
    decoys: ["T","X","Q"],
    pics: [
      { icon: "ti-palette", label: "creative work" },
      { icon: "ti-brush", label: "art" },
      { icon: "ti-pencil-plus", label: "craft" },
      { icon: "ti-artboard", label: "canvas work" }
    ]
  },
  {
    word: "SHAPE",
    hint: "5 letters — circle, square, triangle in Canva",
    decoys: ["T","X","Z"],
    pics: [
      { icon: "ti-circle", label: "round form" },
      { icon: "ti-square", label: "box" },
      { icon: "ti-triangle", label: "polygon" },
      { icon: "ti-star", label: "geometry" }
    ]
  },
  {
    word: "ICON",
    hint: "4 letters — small graphic symbol in Canva",
    decoys: ["X","Z","B"],
    pics: [
      { icon: "ti-heart", label: "small symbol" },
      { icon: "ti-bolt", label: "graphic mark" },
      { icon: "ti-mood-smile", label: "visual cue" },
      { icon: "ti-pin", label: "tiny image" }
    ]
  },
  {
    word: "THEME",
    hint: "5 letters — overall look of your Canva design",
    decoys: ["S","X","Q"],
    pics: [
      { icon: "ti-color-swatch", label: "style" },
      { icon: "ti-mood-happy", label: "vibe" },
      { icon: "ti-layout-2", label: "visual feel" },
      { icon: "ti-sparkles", label: "aesthetic" }
    ]
  },
  {
    word: "PAGE",
    hint: "4 letters — one slide in your Canva project",
    decoys: ["X","Z","Q"],
    pics: [
      { icon: "ti-file", label: "single sheet" },
      { icon: "ti-layout-board", label: "one slide" },
      { icon: "ti-browser", label: "screen view" },
      { icon: "ti-notes", label: "document" }
    ]
  },
  {
    word: "COPY",
    hint: "4 letters — duplicate something in Canva",
    decoys: ["X","Z","B"],
    pics: [
      { icon: "ti-copy", label: "duplicate" },
      { icon: "ti-files", label: "clone" },
      { icon: "ti-clipboard", label: "paste" },
      { icon: "ti-stack", label: "repeat" }
    ]
  },
  {
    word: "RESIZE",
    hint: "6 letters — change canvas dimensions",
    decoys: ["T","Q","X"],
    pics: [
      { icon: "ti-arrows-maximize", label: "make bigger" },
      { icon: "ti-aspect-ratio", label: "dimensions" },
      { icon: "ti-ruler", label: "measurements" },
      { icon: "ti-arrows-diagonal", label: "scale" }
    ]
  }
];

let cur = 0, score = 0, guessed = [], tiles = [], msg = "", msgType = "", done = false, order = [];

const shuffle = a => [...a].sort(() => Math.random() - 0.5);

function buildTiles() {
  const r = ROUNDS[order[cur]];
  const wordTiles = r.word.split("").map(l => ({ l, used: false, decoy: false }));
  const decoyTiles = r.decoys.map(l => ({ l, used: false, decoy: true }));
  return shuffle([...wordTiles, ...decoyTiles]);
}

function setup() {
  order = shuffle(ROUNDS.map((_, i) => i));
  cur = 0; score = 0; done = false;
  setupRound();
}

function setupRound() {
  const word = ROUNDS[order[cur]].word;
  guessed = Array(word.length).fill(null);
  tiles = buildTiles();
  msg = ""; msgType = "";
}

function draw() {
  const app = document.getElementById("app");
  if (done) {
    const perfect = score === ROUNDS.length;
    app.innerHTML = `<div class="end">
      <div class="big">${score}/${ROUNDS.length}</div>
      <div class="sub">${perfect ? "Perfect! You really know your Canva!" : score >= ROUNDS.length/2 ? "Great job! Nice Canva knowledge!" : "Good effort! Keep exploring Canva!"}</div>
      <button onclick="setup();draw()">Play again</button>
    </div>`;
    return;
  }

  const r = ROUNDS[order[cur]];

  app.innerHTML = `
    <div class="top">
      <div class="round-info">Round ${cur+1} of ${ROUNDS.length}</div>
      <div class="score">Score: <span>${score}</span></div>
    </div>
    <div class="pics">
      ${r.pics.map(p => `<div class="pic"><i class="ti ${p.icon}" aria-hidden="true"></i><span>${p.label}</span></div>`).join("")}
    </div>
    <div class="hint-tag">💡 Hint: ${r.hint}</div>
    <div class="decoy-note">⚠️ 3 decoy letters included — not all are needed!</div>
    <div class="answer-row">
      ${guessed.map((g,i) => `<div class="box${g?(" "+(msgType==="ok"?"correct":msgType==="no"?"wrong":"filled")):"" }" onclick="rem(${i})">${g||""}</div>`).join("")}
    </div>
    <div class="tiles">
      ${tiles.map((t,i) => `<div class="tile${t.used?" used":""}${t.decoy?" decoy":""}" onclick="pick(${i})">${t.l}</div>`).join("")}
    </div>
    <div class="btns">
      <button onclick="clr()">Clear</button>
      <button onclick="reveal()">Reveal</button>
    </div>
    <div class="msg ${msgType==="ok"?"ok":msgType==="no"?"no":""}">${msg}</div>`;
}

function pick(i) {
  if (tiles[i].used) return;
  const slot = guessed.indexOf(null);
  if (slot === -1) return;
  guessed[slot] = tiles[i].l;
  tiles[i].used = true;
  msg = ""; msgType = "";
  draw();
  if (!guessed.includes(null)) setTimeout(check, 150);
}

function rem(i) {
  if (!guessed[i]) return;
  const l = guessed[i];
  guessed[i] = null;
  const ti = tiles.findIndex(t => t.l === l && t.used);
  if (ti !== -1) tiles[ti].used = false;
  msg = ""; msgType = ""; draw();
}

function check() {
  if (guessed.join("") === ROUNDS[order[cur]].word) {
    score++; msg = "Correct!"; msgType = "ok"; draw();
    setTimeout(next, 1200);
  } else {
    msg = "Try again!"; msgType = "no"; draw();
    setTimeout(() => { msg = ""; msgType = ""; draw(); }, 800);
  }
}

function clr() {
  guessed.forEach(g => { if(g){ const ti=tiles.findIndex(t=>t.l===g&&t.used); if(ti!==-1)tiles[ti].used=false; } });
  guessed = Array(ROUNDS[order[cur]].word.length).fill(null);
  msg = ""; msgType = ""; draw();
}

function reveal() {
  msg = "Answer: " + ROUNDS[order[cur]].word; draw();
  setTimeout(next, 1800);
}

function next() {
  if (cur >= ROUNDS.length - 1) { done = true; }
  else { cur++; setupRound(); }
  draw();
}

setup(); draw();
</script>
